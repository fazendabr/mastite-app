    // ─── STORAGE ────────────────────────────────────────────────────────────────
    const mkReturn  = () => ({ date:'', culture:'', treatments:[], releaseDate:'', releaseCulture:'' });

    const mkTeat    = ()  => ({ cases:[], dry:'', lost:'', cr:{ entry:'', release:'' } });
    const mkCow     = (num) => ({
      id: num, number: num,
      crAureus: false,
      createdAt: new Date().toISOString().split('T')[0],
      teats: { AE: mkTeat(), AD: mkTeat(), PE: mkTeat(), PD: mkTeat() }
    });

    const normTeat = (t) => ({
      cases: t.cases || [],
      dry:   t.dry   || '',
      lost:  t.lost  || '',
      cr:    t.cr    || { entry:'', release:'' }
    });
    const normCow = (c) => ({ ...c, crAureus: c.crAureus || false, teats: Object.fromEntries(TEATS.map(k => [k, normTeat(c.teats?.[k] || mkTeat())])) });

    // load/save removidos — substituídos por Firestore

    // ─── STATUS ─────────────────────────────────────────────────────────────────
    const teatStatus = (teat) => {
      if (teat.lost) return 'lost';
      if (teat.dry)  return 'dry';
      if (!teat.cases.length) return 'empty';
      const last = teat.cases[teat.cases.length - 1];
      if (last.caseNumber === 3) return 'third';
      if (last.hasReturn && last.ret?.date) return last.ret.releaseDate ? 'released' : 'active';
      return last.releaseDate ? 'released' : 'active';
    };

    const STATUS = {
      empty:    { dot:'bg-gray-300',   badge:'bg-gray-200 text-gray-500',    border:'border-gray-200',  header:'bg-gray-50',    label:'—' },
      active:   { dot:'bg-yellow-400', badge:'bg-yellow-100 text-yellow-800', border:'border-yellow-400',header:'bg-yellow-50',  label:'Em tratamento' },
      released: { dot:'bg-green-400',  badge:'bg-green-100 text-green-800',  border:'border-green-400', header:'bg-green-50',   label:'Liberado' },
      third:    { dot:'bg-red-500',    badge:'bg-red-100 text-red-700',      border:'border-red-500',   header:'bg-red-50',     label:'3º Caso' },
      dry:      { dot:'bg-orange-500',  badge:'bg-orange-100 text-orange-800',  border:'border-orange-500', header:'bg-orange-50',   label:'Seco' },
      lost:     { dot:'bg-gray-600',   badge:'bg-gray-300 text-gray-700',    border:'border-gray-500',  header:'bg-gray-200',   label:'Perdido' },
    };

    const totalCases = (cow) => TEATS.reduce((s,t) => s + cow.teats[t].cases.length, 0);
    const activeTeatCount = (cow) => TEATS.filter(t => {
      const s = teatStatus(cow.teats[t]); return s === 'active' || s === 'third';
    }).length;
    const inCR = (cow) => TEATS.some(t => cow.teats[t].cr?.entry && !cow.teats[t].cr?.release);

    // ─── UTILS ──────────────────────────────────────────────────────────────────
    const fmtDate = (d) => { if (!d) return '—'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y.slice(-2)}`; };

    // ─── COMPONENTES ATÔMICOS ────────────────────────────────────────────────────

    const Field = ({ label, children }) => html`
      <div class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">${label}</label>
        ${children}
      </div>`;

    const toDisplay = (v) => {
      if (!v) return '';
      const [y,m,d] = v.split('-');
      if (!y || !m || !d) return '';
      return `${d}/${m}/${y.slice(-2)}`;
    };
    const toStorage = (text) => {
      const p = text.split('/');
      if (p.length === 3 && p[0].length === 2 && p[1].length === 2 && p[2].length === 2) {
        const yr = parseInt(p[2]) >= 0 ? `20${p[2]}` : p[2];
        return `${yr}-${p[1]}-${p[0]}`;
      }
      return '';
    };

    const DateInput = ({ label, value, onChange }) => {
      const [text, setText] = useState(() => toDisplay(value));
      useEffect(() => { setText(toDisplay(value)); }, [value]);

      const handleInput = (e) => {
        let raw = e.target.value.replace(/[^\d]/g, '').slice(0, 6);
        let masked = raw;
        if (raw.length > 4) masked = raw.slice(0,2) + '/' + raw.slice(2,4) + '/' + raw.slice(4);
        else if (raw.length > 2) masked = raw.slice(0,2) + '/' + raw.slice(2);
        setText(masked);
        if (masked.length === 8) onChange(toStorage(masked));
        else if (masked === '') onChange('');
      };

      return html`
        <${Field} label=${label}>
          <input type="text" inputmode="numeric" placeholder="dd/mm/aa" value=${text}
            onInput=${handleInput}
            class="border-2 border-gray-200 rounded-xl px-3 py-3 bg-white focus:border-blue-500 focus:outline-none w-full text-base" />
        </${Field}>`;
    };

    const CultureSelect = ({ value, onChange, label='Cultura' }) => html`

          ${CULTURES.map(c => html`<option key=${c} value=${c} class="capitalize">${c}</option>`)}

    const Treatments = ({ value=[], onChange }) => {
      const toggle = (n) => onChange(value.includes(n) ? value.filter(x=>x!==n) : [...value,n].sort());

    // ─── SEÇÃO DE RETORNO ────────────────────────────────────────────────────────

          <${Treatments}                                  value=${data.treatments}     onChange=${v=>upd('treatments',v)} />
          <${DateInput}     label="Data de liberação"     value=${data.releaseDate}    onChange=${v=>upd('releaseDate',v)} />
          <${CultureSelect} label="Cultura de liberação"  value=${data.releaseCulture||''} onChange=${v=>upd('releaseCulture',v)} />
        </div>`;
    };

    // ─── FORMULÁRIO 1º / 2º CASO ─────────────────────────────────────────────────
    const Case12Form = ({ caseData, onSave, onCancel }) => {
      const [form, setForm] = useState({ ...caseData, ret: { ...caseData.ret } });
      const [retOpen, setRetOpen] = useState(!!caseData.ret?.date);
      const upd = (f,v) => setForm(s => ({ ...s, [f]:v }));

      const handleSave = () => {
        if (!form.entryDate) { alert('Informe a data de entrada.'); return; }
        const finalForm = { ...form, hasReturn: retOpen };
        if (!retOpen) finalForm.ret = mkReturn();
        onSave(finalForm);
      };

      return html`
        <div class="flex flex-col gap-5 p-4 pb-6">
          <h3 class="text-lg font-bold text-gray-800">${form.caseNumber}º Caso</h3>

          <${DateInput}     label="Data de entrada"       value=${form.entryDate}       onChange=${v=>upd('entryDate',v)} />
          <${CultureSelect}                              value=${form.culture}         onChange=${v=>upd('culture',v)} />
          <${Treatments}                                 value=${form.treatments}      onChange=${v=>upd('treatments',v)} />
          <${DateInput}     label="Data de liberação"    value=${form.releaseDate}     onChange=${v=>upd('releaseDate',v)} />
          <${CultureSelect} label="Cultura de liberação" value=${form.releaseCulture||''} onChange=${v=>upd('releaseCulture',v)} />

          <div class="border-t border-gray-100 pt-4">
            <${ReturnSection}
              data=${form.ret}
              onChange=${v=>upd('ret',v)}
              open=${retOpen}
              onToggle=${()=>setRetOpen(o=>!o)} />
          </div>

          <div class="flex gap-3 pt-2">
            <button type="button" onClick=${onCancel}
              class="flex-1 py-4 rounded-xl border-2 border-gray-300 text-gray-700 font-semibold text-base">
              Cancelar
            </button>
            <button type="button" onClick=${handleSave}
              class="flex-1 py-4 rounded-xl bg-blue-600 text-white font-semibold text-base shadow-sm">
              Salvar
            </button>
          </div>
        </div>`;
    };

    // ─── FORMULÁRIO 3º CASO ──────────────────────────────────────────────────────
    const Case3Form = ({ caseData, onSave, onCancel }) => {
      const [form, setForm] = useState({ ...caseData });
      const upd = (f,v) => setForm(s => ({ ...s, [f]:v }));

      const handleSave = () => {
        if (!form.date) { alert('Informe a data do 3º caso.'); return; }
        onSave(form);
      };

      return html`
        <div class="flex flex-col gap-5 p-4 pb-6">
          <div class="flex items-center gap-2">
            <span class="text-xl">⚠️</span>
            <h3 class="text-lg font-bold text-red-700">3º Caso</h3>
          </div>
          <div class="bg-red-50 border border-red-200 rounded-xl p-4 flex flex-col gap-4">
            <${DateInput} label="Data do 3º Caso" value=${form.date} onChange=${v=>upd('date',v)} />
          </div>
          <div class="flex gap-3">
            <button type="button" onClick=${onCancel}
              class="flex-1 py-4 rounded-xl border-2 border-gray-300 text-gray-700 font-semibold text-base">
              Cancelar
            </button>
            <button type="button" onClick=${handleSave}
              class="flex-1 py-4 rounded-xl bg-red-600 text-white font-semibold text-base shadow-sm">
              Salvar
            </button>
          </div>
        </div>`;
    };

    // ─── VISUALIZAÇÃO DE CASO ────────────────────────────────────────────────────
    const CaseView = ({ c }) => {
      if (c.caseNumber === 3) return html`
        <div class="text-sm">
          ${c.date && html`<div><span class="text-gray-400">Data:</span> <span class="font-medium">${fmtDate(c.date)}</span></div>`}
        </div>`;

      return html`
        <div class="flex flex-col gap-2 text-sm">
          <div class="grid grid-cols-2 gap-x-4 gap-y-1">
            ${c.entryDate   && html`<div><span class="text-gray-400">Entrada:</span> <span class="font-medium">${fmtDate(c.entryDate)}</span></div>`}
            ${c.releaseDate && html`<div><span class="text-gray-400">Liberação:</span> <span class="font-medium">${fmtDate(c.releaseDate)}</span></div>`}
            ${c.culture     && html`<div class="col-span-2"><span class="text-gray-400">Cultura:</span> <span class="font-medium capitalize"> ${c.culture}</span></div>`}
            ${c.treatments?.length > 0 && html`<div class="col-span-2"><span class="text-gray-400">Trat.:</span> <span class="font-medium"> ${c.treatments.join(', ')}</span></div>`}
          </div>
          ${c.hasReturn && c.ret?.date && html`
            <div class="bg-blue-50 border border-blue-100 rounded-lg p-2 mt-1">
              <div class="text-xs font-bold text-blue-600 uppercase mb-1">Retorno</div>
              <div class="grid grid-cols-2 gap-x-4 gap-y-1">
                <div><span class="text-gray-400">Data:</span> <span class="font-medium">${fmtDate(c.ret.date)}</span></div>
                ${c.ret.releaseDate && html`<div><span class="text-gray-400">Lib.:</span> <span class="font-medium">${fmtDate(c.ret.releaseDate)}</span></div>`}
                ${c.ret.culture && html`<div class="col-span-2"><span class="text-gray-400">Cultura:</span> <span class="font-medium capitalize"> ${c.ret.culture}</span></div>`}
                ${c.ret.treatments?.length > 0 && html`<div class="col-span-2"><span class="text-gray-400">Trat.:</span> <span class="font-medium"> ${c.ret.treatments.join(', ')}</span></div>`}
              </div>
            </div>`}
        </div>`;
    };

    // ─── RODAPÉ DO TETO (CR + SECO/PERDIDO) ──────────────────────────────────────
    const TeatFooter = ({ teat, onUpdate, readOnly }) => {
      const hasCR = !!(teat.cr?.entry || teat.cr?.release);
      const [crOpen,    setCrOpen]    = useState(hasCR);
      const [crEditing, setCrEditing] = useState(false);
      const [dlMode, setDlMode] = useState(null); // null | 'dry' | 'lost'
      const [dlDate, setDlDate] = useState('');

      const updCR  = (f,v) => onUpdate({ ...teat, cr: { ...teat.cr, [f]:v } });
      const setDry  = (d)  => onUpdate({ ...teat, dry: d, lost: '' });
      const setLost = (d)  => onUpdate({ ...teat, dry: '', lost: d });

      const confirmDL = () => {
        if (!dlDate) { alert('Informe a data.'); return; }
        dlMode === 'dry' ? setDry(dlDate) : setLost(dlDate);
        setDlMode(null);
      };

      const showCREdit = crOpen && (crEditing || !hasCR);
      const showCRRead = crOpen && hasCR && !crEditing;

      return html`
        <div class="border-t border-gray-100 p-3 flex flex-col gap-3">

          ${/* ── CR ── */''}
          ${showCRRead ? html`
            <div class="bg-purple-50 border border-purple-200 rounded-xl px-3 py-2.5 flex justify-between items-center">
              <div class="flex flex-col gap-0.5">
                <span class="text-xs font-black text-purple-700 uppercase tracking-wide">CR — Crônico</span>
                <div class="flex gap-4 text-sm">
                  <span><span class="text-gray-400 text-xs">Entrada:</span> <span class="font-medium text-purple-900">${fmtDate(teat.cr?.entry)}</span></span>
                  ${teat.cr?.release && html`<span><span class="text-gray-400 text-xs">Liberada:</span> <span class="font-medium text-purple-900">${fmtDate(teat.cr?.release)}</span></span>`}
                </div>
              </div>
              ${!readOnly && html`<button type="button" onClick=${()=>setCrEditing(true)}
                class="text-xs text-purple-600 underline font-semibold">Editar</button>`}
            </div>
          ` : showCREdit ? html`
            <div class="bg-purple-50 border border-purple-200 rounded-xl p-3 flex flex-col gap-3">
              <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-purple-700 uppercase tracking-wide">CR — Crônico</span>
                <button type="button" onClick=${()=>{ hasCR ? setCrEditing(false) : setCrOpen(false); }}
                  class="text-gray-400 text-xl leading-none w-7 h-7 flex items-center justify-center">×</button>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <${DateInput} label="Entrada CR"  value=${teat.cr?.entry||''}   onChange=${v=>updCR('entry',v)} />
                <${DateInput} label="Liberada CR" value=${teat.cr?.release||''} onChange=${v=>updCR('release',v)} />
              </div>
            </div>
          ` : !readOnly ? html`
            <button type="button" onClick=${()=>setCrOpen(true)}
              class="text-purple-600 text-sm font-semibold py-1 flex items-center gap-1.5">
              <span class="text-base leading-none">+</span> CR (Crônico)
            </button>
          ` : ''}

          ${/* ── SECO / PERDIDO ── */''}
          ${teat.dry ? html`
            <div class="bg-orange-50 border-2 border-orange-500 rounded-xl px-3 py-2.5 flex justify-between items-center">
              <div class="flex items-center gap-2">
                <span class="text-xs font-black text-orange-700 uppercase tracking-wide">Seco</span>
                <span class="text-sm text-orange-800 font-medium">${fmtDate(teat.dry)}</span>
              </div>
              ${!readOnly && html`<button type="button" onClick=${()=>setDry('')}
                class="text-xs text-orange-600 underline font-semibold">Remover</button>`}
            </div>
          ` : teat.lost ? html`
            <div class="bg-gray-200 border-2 border-gray-500 rounded-xl px-3 py-2.5 flex justify-between items-center">
              <div class="flex items-center gap-2">
                <span class="text-xs font-black text-gray-700 uppercase tracking-wide">Perdido</span>
                <span class="text-sm text-gray-700 font-medium">${fmtDate(teat.lost)}</span>
              </div>
              ${!readOnly && html`<button type="button" onClick=${()=>setLost('')}
                class="text-xs text-gray-500 underline font-semibold">Remover</button>`}
            </div>
          ` : dlMode ? html`
            <div class="flex flex-col gap-3">
              <${DateInput}
                label=${dlMode==='dry' ? 'Data de secagem' : 'Data de perda do teto'}
                value=${dlDate} onChange=${setDlDate} />
              <div class="flex gap-2">
                <button type="button" onClick=${()=>setDlMode(null)}
                  class="flex-1 py-3 border-2 border-gray-200 rounded-xl text-gray-600 font-semibold text-sm">
                  Cancelar
                </button>
                <button type="button" onClick=${confirmDL}
                  class=${'flex-1 py-3 rounded-xl font-semibold text-sm text-white shadow-sm ' +
                    (dlMode==='dry' ? 'bg-orange-500' : 'bg-gray-600')}>
                  Confirmar
                </button>
              </div>
            </div>
          ` : !readOnly ? html`
            <div class="flex gap-2">
              <button type="button" onClick=${()=>{ setDlMode('dry'); setDlDate(''); }}
                class="flex-1 py-2.5 border-2 border-gray-300 text-gray-600 rounded-xl font-semibold text-sm bg-gray-50 active:bg-gray-100">
                Secar teto
              </button>
              <button type="button" onClick=${()=>{ setDlMode('lost'); setDlDate(''); }}
                class="flex-1 py-2.5 border-2 border-gray-300 text-gray-600 rounded-xl font-semibold text-sm bg-gray-50 active:bg-gray-100">
                Teto perdido
              </button>
            </div>
          ` : ''}
        </div>`;
    };

    // ─── TEAT CARD ───────────────────────────────────────────────────────────────
    const TeatCard = ({ teat, name, onUpdate, readOnly }) => {
      const [editing, setEditing] = useState(null); // null | caseNumber
      const st = teatStatus(teat);
      const S  = STATUS[st];
      const cases = teat.cases;

      const getCase = (n) => cases.find(c => c.caseNumber === n);
      const canAdd  = (n) => {
        if (n === 1) return !getCase(1);
        if (n === 2) return !!getCase(1) && !getCase(2);
        if (n === 3) return !!getCase(2) && !getCase(3);
        return false;
      };

      const saveCase = (data) => {
        const updated = cases.filter(c => c.caseNumber !== data.caseNumber);
        updated.push(data);
        updated.sort((a,b) => a.caseNumber - b.caseNumber);
        onUpdate({ ...teat, cases: updated });
        setEditing(null);
      };

      // Formulário aberto
      if (editing !== null) {
        const existing = getCase(editing);
        const isCase3  = editing === 3;
        const data     = existing || (isCase3 ? mkCase3() : mkCase12(editing));
        const Form     = isCase3 ? Case3Form : Case12Form;
        return html`
          <div class=${'bg-white rounded-2xl border-2 overflow-hidden shadow-sm ' + S.border}>
            <div class=${'flex items-center gap-3 px-4 py-3 border-b border-gray-100 ' + S.header}>
              <span class="text-xl font-black text-gray-800">${name}</span>
              <span class="text-xs text-gray-500">${TEAT_LABELS[name]}</span>
              <span class=${'ml-auto text-xs font-semibold px-2 py-0.5 rounded-full ' + S.badge}>${S.label}</span>
            </div>
            <${Form} caseData=${data} onSave=${saveCase} onCancel=${()=>setEditing(null)} />
          </div>`;
      }

      // Modo leitura
      return html`
        <div class=${'bg-white rounded-2xl border-2 overflow-hidden shadow-sm ' + S.border}>
          <div class=${'flex items-center gap-3 px-4 py-3 border-b border-gray-100 ' + S.header}>
            <span class="text-xl font-black text-gray-800">${name}</span>
            <span class="text-xs text-gray-500">${TEAT_LABELS[name]}</span>
            <span class=${'ml-auto text-xs font-semibold px-2 py-0.5 rounded-full ' + S.badge}>${S.label}</span>
          </div>

          <div class="p-3 flex flex-col gap-2">
            ${[1,2,3].map(n => {
              const c   = getCase(n);
              const can = canAdd(n);
              if (!c && !can) return null;

              if (!c) return !readOnly ? html`
                <button key=${n} type="button" onClick=${()=>setEditing(n)}
                  class="w-full py-3 border-2 border-dashed border-gray-200 rounded-xl text-gray-400 font-semibold text-sm active:bg-gray-50">
                  + Registrar ${n}º caso
                </button>` : null;

              return html`
                <div key=${n} class="border border-gray-100 rounded-xl overflow-hidden">
                  <div class="flex justify-between items-center px-3 py-2 bg-gray-50 border-b border-gray-100">
                    <span class="text-sm font-bold text-gray-600">${n}º Caso</span>
                    ${!readOnly && html`<button type="button" onClick=${()=>setEditing(n)}
                      class="text-xs font-semibold text-blue-600 px-3 py-1.5 rounded-lg bg-blue-50 active:bg-blue-100">
                      Editar
                    </button>`}
                  </div>
                  <div class="px-3 py-2">
                    <${CaseView} c=${c} />
                  </div>
                </div>`;
            })}
          </div>
          <${TeatFooter} teat=${teat} onUpdate=${onUpdate} readOnly=${readOnly} />
        </div>`;
    };

    // ─── FICHA DA VACA ───────────────────────────────────────────────────────────
    const CowDetail = ({ cow, onBack, onUpdate, readOnly }) => {
      const n = totalCases(cow);
      const a = activeTeatCount(cow);
      const cr = inCR(cow);

      const updateTeat = (name, teat) => onUpdate({ ...cow, teats: { ...cow.teats, [name]: teat } });
      const toggleAureus = () => onUpdate({ ...cow, crAureus: !cow.crAureus });

      return html`
        <div class="flex flex-col min-h-screen">
          <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="flex items-center gap-3 px-4 py-4">
              <button onClick=${onBack}
                class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center text-gray-700 font-bold text-lg">
                ←
              </button>
              <div class="flex-1 min-w-0">
                <h1 class="text-2xl font-black text-gray-900">Vaca ${cow.number}</h1>
                <p class="text-xs text-gray-500 mt-0.5">
                  ${n} caso${n!==1?'s':''} na lactação
                  ${a > 0 ? html` · <span class="text-yellow-700 font-semibold">${a} ativo${a!==1?'s':''}</span>` : ''}
                  ${cr ? html` · <span class="text-red-600 font-semibold">em CR</span>` : ''}
                </p>
              </div>
            </div>
          </header>

          <div class="p-4 flex flex-col gap-4 pb-8">
            ${!readOnly && html`
              <button type="button" onClick=${toggleAureus}
                class=${'w-full py-3 rounded-xl border-2 font-bold text-sm transition-colors ' +
                  (cow.crAureus
                    ? 'bg-purple-600 border-purple-600 text-white'
                    : 'bg-white border-gray-200 text-gray-400')}>
                CR AUREUS${cow.crAureus ? ' ✓' : ''}
              </button>`}
            ${cow.crAureus && readOnly && html`
              <div class="w-full py-3 rounded-xl border-2 bg-purple-600 border-purple-600 text-white font-bold text-sm text-center">
                CR AUREUS ✓
              </div>`}

            ${TEATS.map(t => html`
              <${TeatCard} key=${t} teat=${cow.teats[t]} name=${t}
                onUpdate=${(updated)=>updateTeat(t, updated)} readOnly=${readOnly} />`)}
          </div>
        </div>`;
    };

    // ─── MODAL NOVA VACA ─────────────────────────────────────────────────────────
    const NewCowModal = ({ onSave, onCancel, existing }) => {
      const [num, setNum] = useState('');
      const [err, setErr] = useState('');

      const handleSave = () => {
        const v = num.trim();
        if (!v)              { setErr('Informe o número da vaca.'); return; }
        if (existing.includes(v)) { setErr('Vaca já cadastrada.'); return; }
        onSave(v);
      };

      return html`
        <div class="fixed inset-0 bg-black/50 flex items-end z-50"
          onClick=${e => e.target===e.currentTarget && onCancel()}>
          <div class="bg-white rounded-t-3xl w-full p-6 flex flex-col gap-5 shadow-2xl">
            <h2 class="text-xl font-black text-gray-900">Nova Vaca</h2>
            <div class="flex flex-col gap-2">
              <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Número da vaca</label>
              <input
                type="text" inputMode="numeric"
                placeholder="ex: 7715"
                value=${num}
                onInput=${e=>{ setNum(e.target.value); setErr(''); }}
                class="border-2 border-gray-200 rounded-xl px-4 py-4 text-3xl font-black tracking-widest focus:border-blue-500 focus:outline-none text-center"
                autofocus />
              ${err && html`<p class="text-red-600 text-sm text-center">${err}</p>`}
            </div>
            <div class="flex gap-3">
              <button type="button" onClick=${onCancel}
                class="flex-1 py-4 rounded-xl border-2 border-gray-200 text-gray-600 font-semibold text-base">
                Cancelar
              </button>
              <button type="button" onClick=${handleSave}
                class="flex-1 py-4 rounded-xl bg-blue-600 text-white font-bold text-base shadow-sm">
                Cadastrar
              </button>
            </div>
          </div>
        </div>`;
    };

    // ─── DOTS DE STATUS ──────────────────────────────────────────────────────────
    const StatusDots = ({ cow }) => html`
      <div class="grid grid-cols-2 gap-x-2 gap-y-1">
        ${TEATS.map(t => html`
          <div key=${t} class="flex items-center gap-1">
            <div class=${'w-3 h-3 rounded-full flex-shrink-0 ' + STATUS[teatStatus(cow.teats[t])].dot}></div>
            <span class="text-xs text-gray-400">${t}</span>
          </div>`)}
      </div>`;

    // ─── MODAL LIMPAR VACAS ──────────────────────────────────────────────────────
    const RemoveCowsModal = ({ cows, onConfirm, onCancel }) => {
      const [parsed, setParsed] = useState(null);
      const inputRef = useRef(null);

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const wb = window.XLSX.read(ev.target.result, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: false });
            const nums = [...new Set(
              rows.flat().map(v => String(v ?? '').trim()).filter(v => v)
            )];
            setParsed(nums);
          } catch(err) {
            alert('Erro ao ler o arquivo. Certifique-se que é um Excel válido.');
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const existing  = parsed ? parsed.filter(n => cows.some(c => c.number === n)) : [];
      const notFound  = parsed ? parsed.filter(n => !cows.some(c => c.number === n)) : [];
      const canRemove = existing.length > 0;

      return html`
        <div class="fixed inset-0 bg-black/50 flex items-end z-50"
          onClick=${e => e.target===e.currentTarget && onCancel()}>
          <div class="bg-white rounded-t-3xl w-full p-6 flex flex-col gap-5 shadow-2xl"
               style="max-height:80vh;overflow-y:auto">
            <h2 class="text-xl font-black text-gray-900">Limpar Vacas</h2>
            <p class="text-sm text-gray-500">Suba um Excel com os números das vacas a remover (uma por linha ou coluna).</p>

            <input ref=${inputRef} type="file" accept=".xlsx,.xls" class="hidden" onChange=${handleFile} />
            <button type="button" onClick=${()=>inputRef.current.click()}
              class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-semibold text-sm flex items-center justify-center gap-2 active:bg-gray-50">
              📂 Selecionar arquivo Excel
            </button>

            ${parsed && html`
              <div class="flex flex-col gap-3">
                ${canRemove && html`
                  <div class="bg-red-50 border border-red-200 rounded-xl p-4">
                    <p class="text-sm font-bold text-red-700 mb-2">
                      ${existing.length} vaca${existing.length!==1?'s':''} serão removidas:
                    </p>
                    <div class="flex flex-wrap gap-2">
                      ${existing.map(n => html`
                        <span key=${n} class="bg-red-100 text-red-800 font-semibold px-2 py-1 rounded text-xs">${n}</span>`)}
                    </div>
                  </div>`}
                ${notFound.length > 0 && html`
                  <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
                    <p class="text-xs text-gray-400">
                      Não encontradas (${notFound.length}): ${notFound.join(', ')}
                    </p>
                  </div>`}
                ${!canRemove && html`
                  <p class="text-sm text-gray-400 text-center">Nenhuma vaca do arquivo encontrada na listagem.</p>`}
              </div>`}

            <div class="flex gap-3 pt-1">
              <button type="button" onClick=${onCancel}
                class="flex-1 py-4 rounded-xl border-2 border-gray-300 text-gray-700 font-semibold text-base">
                Cancelar
              </button>
              <button type="button"
                onClick=${()=>canRemove && onConfirm(existing)}
                class=${'flex-1 py-4 rounded-xl font-semibold text-base text-white shadow-sm ' +
                  (canRemove ? 'bg-red-600 active:bg-red-700' : 'bg-gray-200 text-gray-400')}>
                Remover${canRemove ? ' '+existing.length : ''}
              </button>
            </div>
          </div>
        </div>`;
    };

    // ─── LOGIN ───────────────────────────────────────────────────────────────────
    const PIN_KEY = 'mastite_pin';
    const getPin  = () => localStorage.getItem(PIN_KEY) || '1234*';

    const LoginScreen = ({ onLogin }) => {
      const [mode,  setMode]  = useState(null);
      const [pin,   setPin]   = useState('');
      const [error, setError] = useState(false);

      const tryGestor = () => {
        if (pin === getPin()) { onLogin('gestor'); }
        else { setError(true); setPin(''); }
      };

      return html`
        <div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6">
          <div class="w-full max-w-sm">
            <div class="text-center mb-10">
              <div class="text-5xl mb-3">🐄</div>
              <h1 class="text-3xl font-black text-gray-900">Controle de Mastite</h1>
              <p class="text-gray-500 mt-2 text-sm">Selecione seu perfil de acesso</p>
            </div>

            ${!mode ? html`
              <div class="flex flex-col gap-4">
                <button onClick=${()=>setMode('gestor')}
                  class="bg-blue-600 text-white rounded-2xl p-5 text-left shadow active:bg-blue-700">
                  <div class="text-lg font-black">Gestor</div>
                  <div class="text-sm opacity-80 mt-0.5">Acesso completo — lançamentos e edição</div>
                </button>
                <button onClick=${()=>onLogin('ordenha')}
                  class="bg-white border-2 border-gray-200 text-gray-800 rounded-2xl p-5 text-left active:bg-gray-50">
                  <div class="text-lg font-black">Ordenha</div>
                  <div class="text-sm text-gray-500 mt-0.5">Somente visualização</div>
                </button>
              </div>
            ` : html`
              <div class="bg-white rounded-2xl shadow-sm p-6 flex flex-col gap-4">
                <div>
                  <h2 class="text-lg font-black text-gray-900">Acesso Gestor</h2>
                  <p class="text-sm text-gray-500 mt-1">Digite o PIN para continuar</p>
                </div>
                <input type="password" inputmode="numeric" placeholder="••••" value=${pin}
                  onInput=${e=>{setPin(e.target.value);setError(false);}}
                  onKeyDown=${e=>e.key==='Enter'&&tryGestor()}
                  class=${'border-2 rounded-xl px-4 py-3 text-center text-2xl tracking-widest w-full focus:outline-none '+(error?'border-red-400 bg-red-50':'border-gray-200 focus:border-blue-500')} />
                ${error && html`<p class="text-red-500 text-sm text-center -mt-2">PIN incorreto</p>`}
                <button onClick=${tryGestor}
                  class="bg-blue-600 text-white rounded-xl py-3 font-bold text-base active:bg-blue-700">Entrar</button>
                <button onClick=${()=>{setMode(null);setPin('');setError(false);}}
                  class="text-gray-400 text-sm text-center py-1">← Voltar</button>
              </div>
            `}
          </div>
        </div>`;
    };

    // ─── LISTA DE VACAS ──────────────────────────────────────────────────────────
    const FILTERS = [
      { key:'all',      label:'Todos' },
      { key:'active',   label:'Ativos' },
      { key:'cr',       label:'Em CR' },
      { key:'crAureus', label:'CR Aureus' },
      { key:'chronic',  label:'Crônica' },
      { key:'n1',       label:'1 caso' },
      { key:'n2',       label:'2 casos' },
      { key:'n3',       label:'3 casos' },
      { key:'n4',       label:'4 casos' },
      { key:'dry',      label:'Teto seco' },
      { key:'lost',     label:'Teto perdido' },
    ];

    const applyFilter = (cow, key) => {
      if (key === 'all')      return true;
      if (key === 'active')   return activeTeatCount(cow) > 0;
      if (key === 'cr')       return inCR(cow) || cow.crAureus;
      if (key === 'crAureus') return !!cow.crAureus;
      if (key === 'chronic')  return TEATS.some(t => cow.teats[t].cases.some(cs => cs.caseNumber===3));
      if (key === 'n1')       return totalCases(cow) === 1;
      if (key === 'n2')       return totalCases(cow) === 2;
      if (key === 'n3')       return totalCases(cow) === 3;
      if (key === 'n4')       return totalCases(cow) >= 4;
      if (key === 'dry')      return TEATS.some(t => cow.teats[t].dry);
      if (key === 'lost')     return TEATS.some(t => cow.teats[t].lost);
      return true;
    };

    const CowList = ({ cows, onSelect, onAdd, onDash, onRemove, search, setSearch, activeFilter, setActiveFilter, readOnly, onLogout }) => {

      const filtered = cows
        .filter(c => c.number.toLowerCase().includes(search.toLowerCase()))
        .filter(c => applyFilter(c, activeFilter))
        .sort((a,b) => a.number.localeCompare(b.number, undefined, { numeric:true }));

      return html`
        <div class="flex flex-col min-h-screen">
          <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="px-4 pt-5 pb-3">
              <div class="flex items-center gap-2 mb-3">
                <h1 class="text-2xl font-black text-gray-900 flex-1">Controle de Mastite</h1>
                ${readOnly && html`<span class="text-xs font-bold text-gray-400 border border-gray-200 px-2 py-1 rounded-lg">Ordenha</span>`}
                <button onClick=${onDash}
                  class="bg-gray-100 text-gray-700 rounded-xl px-3 py-2 text-sm font-bold flex items-center gap-1 active:bg-gray-200">
                  📊
                </button>
                ${!readOnly && html`<button onClick=${onRemove}
                  class="bg-gray-100 text-gray-700 rounded-xl px-3 py-2 text-sm font-bold flex items-center gap-1 active:bg-gray-200">
                  🗑
                </button>`}
                <button onClick=${onLogout}
                  class="bg-gray-100 text-gray-500 rounded-xl px-3 py-2 text-sm font-bold active:bg-gray-200">
                  Sair
                </button>
              </div>
              <div class="flex gap-2 mb-3">
                <input type="search" placeholder="Buscar vaca..." value=${search}
                  onInput=${e=>setSearch(e.target.value)}
                  class="flex-1 border-2 border-gray-200 rounded-xl px-4 py-3 text-base bg-gray-50 focus:border-blue-500 focus:outline-none" />
                ${!readOnly && html`<button onClick=${onAdd}
                  class="bg-blue-600 text-white rounded-xl w-12 font-black text-2xl flex items-center justify-center shadow-sm active:bg-blue-700">
                  +
                </button>`}
              </div>
              <div class="-mx-4 flex gap-2 overflow-x-scroll px-4 pb-2" style="-webkit-overflow-scrolling:touch">
                ${FILTERS.map(f => {
                  const active = activeFilter === f.key;
                  const count  = f.key === 'all' ? cows.length : cows.filter(c => applyFilter(c, f.key)).length;
                  return html`<button key=${f.key}
                    onClick=${() => setActiveFilter(f.key)}
                    class="flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-semibold border-2 transition-colors whitespace-nowrap
                      ${active
                        ? 'bg-blue-600 text-white border-blue-600'
                        : 'bg-white text-gray-600 border-gray-200 active:bg-gray-50'}">
                    ${f.label} <span class="${active ? 'opacity-80' : 'text-gray-400'}">${count}</span>
                  </button>`;
                })}
              </div>
            </div>
          </header>

          <div class="flex-1 p-4 flex flex-col gap-3 pb-8">
            ${filtered.length === 0 && html`
              <div class="text-center py-20 text-gray-400 flex flex-col items-center gap-2">
                <span class="text-5xl">🐄</span>
                <p class="text-lg font-medium">${search || activeFilter!=='all' ? 'Nenhuma vaca encontrada' : 'Nenhuma vaca cadastrada'}</p>
                ${!search && activeFilter==='all' && html`<p class="text-sm">Toque em <strong>+</strong> para adicionar</p>`}
              </div>`}

            ${filtered.map(cow => {
              const a = activeTeatCount(cow);
              const n = totalCases(cow);
              const cr = inCR(cow);
              return html`
                <button key=${cow.id} onClick=${()=>onSelect(cow)}
                  class="bg-white rounded-2xl shadow-sm p-4 flex items-center gap-4 text-left w-full border-2 border-transparent active:border-blue-200 active:bg-blue-50 transition-colors">
                  <div class="w-16 h-16 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0">
                    <span class="text-xl font-black text-gray-700">${cow.number}</span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="font-black text-gray-900 text-lg">${cow.number}</span>
                      ${cr && html`<span class="text-xs font-bold text-white bg-red-600 px-2 py-0.5 rounded-full">CR</span>`}
                      ${cow.crAureus && html`<span class="text-xs font-bold text-white bg-purple-600 px-2 py-0.5 rounded-full">CR AUREUS</span>`}
                    </div>
                    <div class="text-sm text-gray-500 mt-0.5">
                      ${n === 0 ? 'Sem registros' : `${n} caso${n!==1?'s':''} na lactação`}
                    </div>
                    ${a > 0 && html`
                      <div class="text-xs font-semibold text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded-full inline-block mt-1">
                        ${a} teto${a!==1?'s':''} ativo${a!==1?'s':''}
                      </div>`}
                  </div>
                  <${StatusDots} cow=${cow} />
                  <span class="text-gray-300 text-2xl">›</span>
                </button>`; })}
          </div>
        </div>`;
    };

    // ─── DASHBOARD ───────────────────────────────────────────────────────────────
    const Dashboard = ({ cows, onBack }) => {
      const [filterN, setFilterN] = useState(null);

      const total = cows.length;
      const caseMap = {};
      cows.forEach(c => { const n = totalCases(c); caseMap[n] = (caseMap[n]||0)+1; });
      const maxN = Math.max(...Object.keys(caseMap).map(Number), 0);
      const barData = Array.from({ length: maxN+1 }, (_,i) => ({ n:i, count:caseMap[i]||0 }));
      const maxCount = Math.max(...barData.map(b => b.count), 1);

      const sortNum = arr => [...arr].sort((a,b) => a.number.localeCompare(b.number, undefined, { numeric:true }));

      const withDry    = cows.filter(c => TEATS.some(t => c.teats[t].dry)).length;
      const withLost   = cows.filter(c => TEATS.some(t => c.teats[t].lost)).length;
      const inCRCount  = cows.filter(c => inCR(c) || c.crAureus).length;
      const crAureus   = cows.filter(c => c.crAureus).length;
      const crList     = sortNum(cows.filter(c => inCR(c) || c.crAureus));
      const filteredCows = filterN !== null ? sortNum(cows.filter(c => totalCases(c)===filterN)) : [];

      return html`
        <div class="flex flex-col min-h-screen bg-gray-50">
          <header class="bg-blue-700 text-white px-4 pt-10 pb-5 sticky top-0 z-10 shadow-md">
            <div class="flex items-center gap-3">
              <button onClick=${onBack}
                class="w-10 h-10 flex items-center justify-center rounded-xl bg-blue-600 active:bg-blue-500 text-2xl font-bold">
                ‹
              </button>
              <h1 class="text-xl font-bold">Dashboard</h1>
            </div>
          </header>

          <div class="p-4 flex flex-col gap-5 pb-10">

            <div class="grid grid-cols-2 gap-3">
              <div class="bg-white rounded-2xl shadow-sm p-3 text-center">
                <div class="text-2xl font-black text-blue-700">${total}</div>
                <div class="text-xs text-gray-500 mt-1">animais</div>
              </div>
              <div class="bg-white rounded-2xl shadow-sm p-3 text-center">
                <div class="text-2xl font-black text-red-600">${inCRCount}</div>
                <div class="text-xs text-gray-500 mt-1">em CR</div>
              </div>
              <div class="bg-white rounded-2xl shadow-sm p-3 text-center">
                <div class="text-2xl font-black text-orange-500">${total > 0 ? Math.round(withDry/total*100) : 0}%</div>
                <div class="text-xs text-gray-500 mt-1">c/ teto seco</div>
              </div>
              <div class="bg-white rounded-2xl shadow-sm p-3 text-center">
                <div class="text-2xl font-black text-gray-600">${total > 0 ? Math.round(withLost/total*100) : 0}%</div>
                <div class="text-xs text-gray-500 mt-1">c/ teto perdido</div>
              </div>
              ${crAureus > 0 && html`
                <div class="col-span-2 bg-purple-50 border border-purple-200 rounded-2xl p-3 text-center">
                  <div class="text-2xl font-black text-purple-700">${crAureus}</div>
                  <div class="text-xs text-gray-500 mt-1">CR Aureus</div>
                </div>`}
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-4">
              <h2 class="text-base font-bold text-gray-800 mb-1">Animais por nº de casos</h2>
              <p class="text-xs text-gray-400 mb-4">toque em uma barra para filtrar</p>
              <div class="flex items-end gap-1" style="height:128px">
                ${barData.map(({ n, count }) => {
                  const h = count > 0 ? Math.max(Math.round(count/maxCount*120), 8) : 0;
                  const active = filterN === n;
                  return html`
                    <div key=${n} class="flex-1 flex flex-col items-center cursor-pointer"
                         onClick=${() => setFilterN(active ? null : n)}>
                      <div class="text-xs text-gray-500 mb-1 leading-none">${count||''}</div>
                      <div class=${'w-full rounded-t-lg ' + (active ? 'bg-blue-600' : 'bg-blue-300 active:bg-blue-500')}
                           style=${'height:'+h+'px'}></div>
                    </div>`;
                })}
              </div>
              <div class="flex gap-1 mt-2">
                ${barData.map(({ n }) => html`
                  <div key=${n} class=${'flex-1 text-center text-xs font-semibold ' + (filterN===n ? 'text-blue-700' : 'text-gray-400')}>${n}</div>`)}
              </div>
            </div>

            ${filterN !== null && html`
              <div class="bg-white rounded-2xl shadow-sm p-4">
                <div class="flex items-center justify-between mb-3">
                  <h2 class="text-base font-bold text-gray-800">
                    ${filteredCows.length} ${filteredCows.length===1?'animal':'animais'} — ${filterN} ${filterN===1?'caso':'casos'}
                  </h2>
                  <button onClick=${()=>setFilterN(null)} class="text-gray-400 text-xl leading-none">×</button>
                </div>
                ${filteredCows.length === 0
                  ? html`<p class="text-sm text-gray-400">Nenhum animal.</p>`
                  : html`<div class="flex flex-wrap gap-2">
                      ${filteredCows.map(c => html`
                        <span key=${c.id} class="bg-gray-100 text-gray-800 font-semibold px-3 py-1 rounded-lg text-sm">${c.number}</span>`)}
                    </div>`}
              </div>`}

            <div class="bg-white rounded-2xl shadow-sm p-4">
              <h2 class="text-base font-bold text-gray-800 mb-3">
                Animais em CR — ${crList.length}
              </h2>
              ${crList.length === 0
                ? html`<p class="text-sm text-gray-400">Nenhum animal em CR.</p>`
                : html`<div class="divide-y divide-gray-100">
                    ${crList.map(c => html`
                      <div key=${c.id} class="py-2.5 flex items-center gap-3">
                        <span class="font-black text-gray-800 w-14 flex-shrink-0">${c.number}</span>
                        <div class="flex gap-1 flex-wrap">
                          ${inCR(c) && html`<span class="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">CR</span>`}
                          ${c.crAureus && html`<span class="bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded">CR AUREUS</span>`}
                          ${TEATS.filter(t => c.teats[t].cr?.entry && !c.teats[t].cr?.release).map(t => html`
                            <span key=${t} class="bg-gray-100 text-gray-600 text-xs font-semibold px-2 py-1 rounded">${t}</span>`)}
                        </div>
                      </div>`)}
                  </div>`}
            </div>

          </div>
        </div>`;
    };

    // ─── APP ─────────────────────────────────────────────────────────────────────
    const App = () => {
      const [role, setRole]           = useState(null);
      const [cows, setCows]           = useState([]);
      const [loading, setLoading]     = useState(true);
      const [view, setView]           = useState('list');
      const [selected, setSelected]   = useState(null);
      const [showNew, setShowNew]     = useState(false);
      const [showRemove, setShowRemove] = useState(false);
      const [listSearch, setListSearch]   = useState('');
      const [listFilter, setListFilter]   = useState('all');
      const savedScroll = useRef(0);

      const readOnly = role === 'ordenha';
      const handleLogout = () => { setRole(null); setView('list'); setSelected(null); };

      useEffect(() => {
        const unsub = onSnapshot(COWS_COL, (snap) => {
          if (snap.empty) {
            const batch = writeBatch(db);
            SEED_DATA.forEach(cow => batch.set(doc(db, 'cows', cow.id), normCow(cow)));
            batch.commit();
            return;
          }
          const data = snap.docs.map(d => normCow(d.data()));
          setCows(data);
          setSelected(prev => prev ? (data.find(c => c.id === prev.id) || prev) : null);
          setLoading(false);
        });
        return unsub;
      }, []);

      const handleSelect = (cow) => {
        savedScroll.current = window.scrollY;
        setSelected(cow);
        setView('detail');
      };

      const handleRemoveCows = (numbers) => {
        deleteCowDocs(numbers);
        setShowRemove(false);
      };

      const handleAdd = (number) => {
        const cow = mkCow(number);
        saveCow(cow);
        setShowNew(false);
        handleSelect(cow);
      };

      const handleUpdate = (updated) => {
        setSelected(updated);
        saveCow(updated);
      };

      const handleBack = () => {
        const scroll = savedScroll.current;
        setView('list');
        setSelected(null);
        requestAnimationFrame(() => window.scrollTo(0, scroll));
      };

      if (loading) return html`
        <div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center gap-4">
          <div class="text-5xl">🐄</div>
          <p class="text-gray-500 font-medium">Carregando dados…</p>
        </div>`;
      if (!role) return html`<${LoginScreen} onLogin=${setRole} />`;

      return html`
        <div class="max-w-lg mx-auto min-h-screen">
          ${view === 'list' && html`
            <${CowList} cows=${cows} onSelect=${handleSelect} onAdd=${()=>setShowNew(true)} onDash=${()=>setView('dashboard')} onRemove=${()=>setShowRemove(true)}
              search=${listSearch} setSearch=${setListSearch} activeFilter=${listFilter} setActiveFilter=${setListFilter}
              readOnly=${readOnly} onLogout=${handleLogout} />`}
          ${view === 'detail' && selected && html`
            <${CowDetail} cow=${selected} onBack=${handleBack} onUpdate=${handleUpdate} readOnly=${readOnly} />`}
          ${view === 'dashboard' && html`
            <${Dashboard} cows=${cows} onBack=${handleBack} />`}
          ${showNew && html`
            <${NewCowModal}
              onSave=${handleAdd}
              onCancel=${()=>setShowNew(false)}
              existing=${cows.map(c=>c.number)} />`}
          ${showRemove && html`
            <${RemoveCowsModal}
              cows=${cows}
              onConfirm=${handleRemoveCows}
              onCancel=${()=>setShowRemove(false)} />`}
        </div>`;
    };

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
